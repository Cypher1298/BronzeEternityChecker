kind = "web"
previewPath = "/"
title = "Game Codes"
version = "1.0.0"
id = "artifacts/game-codes"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19401

[services.development]
run = "pnpm --filter @workspace/game-codes run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/game-codes", "run", "build" ]
publicDir = "artifacts/game-codes/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19401"
BASE_PATH = "/"
